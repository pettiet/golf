<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-hover: #1c2330;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #2ea043;
    --accent-dim: #1f6f33;
    --info: #3b82f6;
    --warn: #f97316;
    --purple: #a855f7;
    --teal: #14b8a6;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 0 0 80px 0;
    font-size: 16px;
    line-height: 1.5;
  }
  .back-link { display: inline-block; padding: 12px 16px; color: var(--text-dim); text-decoration: none; font-size: 14px; }
  header {
    background: linear-gradient(135deg, #1f6f33 0%, #0d3018 100%);
    padding: 16px 20px 22px;
  }
  header .date-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.7); }
  header h1 { font-size: 22px; font-weight: 700; margin-top: 2px; }
  header .sub { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 4px; }
  header .score-strip {
    margin-top: 12px; background: rgba(0,0,0,0.25); border-radius: 8px;
    padding: 8px 12px; font-size: 12px; color: white;
    display: flex; justify-content: space-between; align-items: center;
  }
  header .score-strip strong { font-size: 16px; font-weight: 700; }

  .container { padding: 14px; max-width: 600px; margin: 0 auto; }

  .day-selector {
    display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding: 4px 0;
    scrollbar-width: none;
  }
  .day-selector::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
    color: var(--text-dim); padding: 6px 12px; border-radius: 16px; font-size: 12px;
    font-family: inherit; cursor: pointer; white-space: nowrap;
  }
  .day-pill.active {
    background: var(--accent); border-color: var(--accent); color: white; font-weight: 600;
  }
  .day-pill.has-progress { border-color: var(--accent-dim); }

  .schedule-tag {
    display: inline-block; background: rgba(239,68,68,0.15); color: var(--red);
    padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    margin-bottom: 12px;
  }

  .section {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 12px; overflow: hidden;
  }
  .section.morning { border-left: 4px solid var(--warn); }
  .section.rooms { border-left: 4px solid var(--purple); }
  .section.workout { border-left: 4px solid var(--red); }
  .section.golf { border-left: 4px solid var(--accent); }
  .section.evening { border-left: 4px solid var(--info); }

  .section-header {
    padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none;
  }
  .section-header h2 {
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .section.morning .section-header h2 { color: var(--warn); }
  .section.rooms .section-header h2 { color: var(--purple); }
  .section.workout .section-header h2 { color: var(--red); }
  .section.golf .section-header h2 { color: var(--accent); }
  .section.evening .section-header h2 { color: var(--info); }
  .section-header .right {
    display: flex; gap: 8px; align-items: center;
  }
  .section-progress {
    font-size: 11px; color: var(--text-dim); padding: 3px 8px; border-radius: 4px; background: var(--bg);
  }
  .section-progress.complete { background: rgba(46,160,67,0.15); color: var(--accent); font-weight: 600; }
  .section-chev { color: var(--text-dim); transition: transform 0.2s; font-size: 11px; }
  .section.collapsed .section-chev { transform: rotate(-90deg); }

  .section-body { padding: 0 14px 12px; }
  .section.collapsed .section-body { display: none; }
  .section-intro {
    font-size: 12px; color: var(--text-dim); margin-bottom: 10px; line-height: 1.5;
    background: rgba(255,255,255,0.02); padding: 8px 10px; border-radius: 6px;
  }
  .section-intro strong { color: var(--text); }

  .subsection-title {
    font-size: 11px; color: var(--text-dim); letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: 600;
    margin: 12px 0 6px; padding-bottom: 4px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  .subsection-title:first-child { margin-top: 0; }

  .task {
    padding: 9px 0;
    border-bottom: 1px solid rgba(48,54,61,0.4);
  }
  .task:last-child { border-bottom: none; }
  .task-row { display: flex; align-items: flex-start; gap: 12px; }
  .task-row input[type=checkbox] {
    appearance: none; -webkit-appearance: none;
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-radius: 6px; margin-top: 0px;
    cursor: pointer; flex-shrink: 0;
    position: relative; background: transparent;
  }
  .task-row input[type=checkbox]:checked {
    background: var(--accent); border-color: var(--accent);
  }
  .task-row input[type=checkbox]:checked::after {
    content: '✓'; position: absolute; top: -2px; left: 3px;
    color: white; font-weight: bold; font-size: 17px;
  }
  .task-label { font-size: 15px; flex: 1; cursor: pointer; line-height: 1.4; }
  .task-row.done .task-label { color: var(--text-dim); text-decoration: line-through; }
  .task-spec {
    font-size: 12px; color: var(--text-dim);
    margin-left: 36px; margin-top: 2px; line-height: 1.5;
  }
  .task-time {
    display: inline-block; background: var(--bg); color: var(--text-dim);
    padding: 1px 6px; border-radius: 3px; font-size: 10px;
    margin-left: 6px; font-weight: 600;
  }

  .info-toggle {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer;
    margin-left: 36px; margin-top: 6px;
    display: inline-flex; align-items: center; gap: 5px; font-family: inherit;
  }
  .info-toggle .chev { transition: transform 0.2s; font-size: 8px; }
  .info-toggle.open .chev { transform: rotate(180deg); }
  .info-panel {
    display: none; margin-left: 36px; margin-top: 6px;
    background: rgba(46,160,67,0.05); border-left: 2px solid var(--border);
    border-radius: 0 4px 4px 0; padding: 10px 12px;
    font-size: 12px; color: var(--text-dim); line-height: 1.6;
  }
  .info-panel.open { display: block; }
  .info-panel strong { color: var(--text); }
  .info-panel ol, .info-panel ul { padding-left: 16px; margin: 4px 0; }
  .info-panel li { margin-bottom: 4px; }
  .info-panel .tip { color: #fcd34d; margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.1); }
  .info-panel table { width: 100%; margin: 6px 0; border-collapse: collapse; font-size: 11px; }
  .info-panel th, .info-panel td { padding: 4px 6px; text-align: left; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .info-panel th { color: var(--text); }

  .quick-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;
  }
  .quick-link {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 10px; border-radius: 8px; text-decoration: none;
    font-size: 13px; font-weight: 600; text-align: center;
  }
  .quick-link:active { background: var(--card-hover); }
  .quick-link .ico { font-size: 16px; display: block; margin-bottom: 2px; }

  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 14px; font-family: inherit;
  }
  .field textarea { min-height: 60px; resize: vertical; }

  .rating-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .rating-group button {
    background: var(--bg); border: 1px solid var(--border); color: var(--text-dim);
    padding: 10px 0; border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .rating-group button.selected { background: var(--info); border-color: var(--info); color: white; }

  .footer-actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 10px 14px; display: flex; gap: 8px; justify-content: center;
  }
  .footer-actions button {
    flex: 1; max-width: 240px; background: var(--accent); color: white;
    border: none; border-radius: 8px; padding: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>

  };

  // ===== Date helpers =====
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDateLabel(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  }

  function getWeekDates() {
    return Object.keys(WEEK).sort();
  }

  let viewDate = todayStr();
  if (!WEEK[viewDate]) {
    const weekDates = getWeekDates();
    viewDate = weekDates[0];
  }

  function getDayData(date) {
    if (!allData[date]) allData[date] = {};
    return allData[date];
  }

  function load() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) allData = JSON.parse(saved);
    } catch(e) { allData = {}; }
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); } catch(e) {}
  }

  // ===== Render =====
  function renderDaySelector() {
    const sel = document.getElementById('daySelector');
    sel.innerHTML = '';
    getWeekDates().forEach(date => {
      const d = new Date(date + 'T12:00:00');
      const day = d.toLocaleDateString('en-US', { weekday: 'short' });
      const dayNum = d.getDate();
      const pill = document.createElement('button');
      pill.className = 'day-pill' + (date === viewDate ? ' active' : '');
      pill.textContent = `${day} ${dayNum}`;
      const dayData = allData[date] || {};
      const hasProgress = Object.entries(dayData).some(([k,v]) => v === true && !k.startsWith('_'));
      if (hasProgress && date !== viewDate) pill.classList.add('has-progress');
      pill.onclick = () => { viewDate = date; render(); };
      sel.appendChild(pill);
    });
  }

  function renderSection(sectionClass, title, intro, tasks, dayData, defaultOpen = true) {
    let html = `<div class="section ${sectionClass}${defaultOpen ? '' : ' collapsed'}" data-section="${sectionClass}">`;
    const completed = tasks.filter(t => dayData[t.id]).length;
    const total = tasks.length;
    const isComplete = completed === total && total > 0;
    html += `<div class="section-header" onclick="toggleSection('${sectionClass}')">
      <h2>${title}</h2>
      <div class="right">
        <span class="section-progress ${isComplete ? 'complete' : ''}">${isComplete ? '✓ Done' : completed + '/' + total}</span>
        <span class="section-chev">▼</span>
      </div>
    </div>`;
    html += `<div class="section-body">`;
    if (intro) html += `<div class="section-intro">${intro}</div>`;
    tasks.forEach(t => {
      const checked = !!dayData[t.id];
      html += `<div class="task">
        <div class="task-row ${checked ? 'done' : ''}">
          <input type="checkbox" id="${t.id}" ${checked ? 'checked' : ''} onchange="toggleTask('${t.id}', this.checked)">
          <label class="task-label" for="${t.id}">${t.label}${t.time ? ' <span class="task-time">' + t.time + '</span>' : ''}</label>
        </div>`;
      if (t.spec) html += `<div class="task-spec">${t.spec}</div>`;
      if (t.info) {
        html += `<button class="info-toggle" onclick="toggleInfo('info_${t.id}', this)">How to <span class="chev">▼</span></button>
                 <div class="info-panel" id="info_${t.id}">${INFO_PANELS[t.info] || ''}</div>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
    return html;
  }

  function render() {
    const dayPlan = WEEK[viewDate];
    const dayData = getDayData(viewDate);

    document.getElementById('dateLabel').textContent = formatDateLabel(viewDate);
    if (dayPlan) {
      document.getElementById('dayTitle').textContent = dayPlan.title;
      document.getElementById('daySub').textContent = dayPlan.sub;
    } else {
      document.getElementById('dayTitle').textContent = 'No plan';
      document.getElementById('daySub').textContent = '';
    }

    renderDaySelector();

    // Schedule tag (orthodontist, etc.)
    const tagContainer = document.getElementById('scheduleTagContainer');
    if (dayPlan && dayPlan.scheduleTag) {
      tagContainer.innerHTML = `<div class="schedule-tag">${dayPlan.scheduleTag}</div>`;
    } else {
      tagContainer.innerHTML = '';
    }

    const container = document.getElementById('sectionsContainer');
    if (!dayPlan) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">No plan scheduled for this date.</div>';
      updateTodayProgress();
      return;
    }

    let html = '';

    // Morning routine with day-specific wake time
    html += renderSection('morning', `🌅 Morning Routine — Wake ${dayPlan.wakeTime}`, '', morningTasks(dayPlan.wakeTime), dayData);

    // Rooms
    html += renderSection('rooms', '🏠 Rooms Check', 'Bedroom, bathroom, game room. Discipline transfers.', STANDARD_ROOMS, dayData);

    // Workout (Monday + Thursday)
    if (dayPlan.includeWorkout && dayPlan.workout) {
      html += renderSection('workout', dayPlan.workout.title, dayPlan.workout.intro, dayPlan.workout.tasks, dayData);
    }

    // Golf
    html += renderSection('golf', '⛳ Golf Plan', dayPlan.golf.intro, dayPlan.golf.tasks, dayData);

    // Quick links
    html += `<div class="section">
      <div class="section-header" style="cursor: default;"><h2 style="color: var(--text-dim);">⚡ Quick Actions</h2></div>
      <div class="section-body">
        <div class="quick-actions">
          <a href="round_tracker.html" class="quick-link"><span class="ico">📋</span>Round Tracker</a>
          <a href="session_notes.html" class="quick-link"><span class="ico">📝</span>Session Notes</a>
        </div>
      </div>
    </div>`;

    // Evening
    html += renderSection('evening', '🌙 Evening', 'Wind down. Tomorrow starts when you go to bed tonight.', eveningTasks(), dayData);

    // Notes
    html += `<div class="section">
      <div class="section-header" style="cursor: default;"><h2 style="color: var(--text-dim);">📓 Today's Quick Note</h2></div>
      <div class="section-body">
        <div class="field">
          <label>Anything worth flagging? (optional)</label>
          <textarea id="dailyNote" oninput="saveDailyNote(this.value)" placeholder="">${dayData._note || ''}</textarea>
        </div>
        <div class="field">
          <label>How was today overall? (1-5)</label>
          <div class="rating-group">
            ${[1,2,3,4,5].map(n => `<button onclick="setDayRating(${n})" class="${dayData._rating == n ? 'selected' : ''}" id="rating_${n}">${n}</button>`).join('')}
          </div>
        </div>
      </div>
    </div>`;

    container.innerHTML = html;
    updateTodayProgress();
  }

  function toggleSection(sectionClass) {
    const el = document.querySelector(`[data-section="${sectionClass}"]`);
    if (el) el.classList.toggle('collapsed');
  }
  window.toggleSection = toggleSection;

  function toggleTask(id, checked) {
    const dayData = getDayData(viewDate);
    dayData[id] = checked;
    save();
    render();
  }
  window.toggleTask = toggleTask;

  function toggleInfo(id, btn) {
    event.stopPropagation();
    const panel = document.getElementById(id);
    const labelNode = btn.firstChild;
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    labelNode.nodeValue = isOpen ? 'Hide ' : 'How to ';
  }
  window.toggleInfo = toggleInfo;

  function saveDailyNote(val) {
    const dayData = getDayData(viewDate);
    dayData._note = val;
    save();
  }
  window.saveDailyNote = saveDailyNote;

  function setDayRating(n) {
    const dayData = getDayData(viewDate);
    dayData._rating = n;
    save();
    [1,2,3,4,5].forEach(i => {
      document.getElementById('rating_' + i)?.classList.toggle('selected', i === n);
    });
  }
  window.setDayRating = setDayRating;

  function getAllTaskIds(dayPlan) {
    let ids = [...morningTasks(dayPlan.wakeTime).map(t => t.id),
               ...STANDARD_ROOMS.map(t => t.id),
               ...dayPlan.golf.tasks.map(t => t.id),
               ...eveningTasks().map(t => t.id)];
    if (dayPlan.includeWorkout && dayPlan.workout) {
      ids = [...ids, ...dayPlan.workout.tasks.map(t => t.id)];
    }
    return ids;
  }

  function updateTodayProgress() {
    const dayPlan = WEEK[viewDate];
    if (!dayPlan) {
      document.getElementById('todayProgress').textContent = '—';
      return;
    }
    const dayData = getDayData(viewDate);
    const ids = getAllTaskIds(dayPlan);
    const total = ids.length;
    const done = ids.filter(id => dayData[id]).length;
    document.getElementById('todayProgress').textContent = `${done} / ${total}`;
  }

  async function shareToday() {
    const dayPlan = WEEK[viewDate];
    if (!dayPlan) { alert('No plan for this date'); return; }
    const dayData = getDayData(viewDate);
    let text = `DAILY PROGRESS — ${formatDateLabel(viewDate)}\n`;
    text += `${dayPlan.title}\n`;
    text += `========================================\n\n`;

    function block(title, tasks) {
      let s = `${title}\n`;
      tasks.forEach(t => {
        const checked = dayData[t.id] ? '✓' : '✗';
        s += `  ${checked} ${t.label}\n`;
      });
      return s + '\n';
    }

    text += block(`🌅 MORNING (wake ${dayPlan.wakeTime})`, morningTasks(dayPlan.wakeTime));
    text += block('🏠 ROOMS', STANDARD_ROOMS);
    if (dayPlan.includeWorkout) text += block('💪 WORKOUT', dayPlan.workout.tasks);
    text += block('⛳ GOLF', dayPlan.golf.tasks);
    text += block('🌙 EVENING', eveningTasks());

    if (dayData._rating) text += `Day rating: ${dayData._rating} / 5\n`;
    if (dayData._note) text += `Note: ${dayData._note}\n`;

    if (navigator.share) {
      try { await navigator.share({ title: 'Daily Progress', text: text }); return; }
      catch (err) { if (err.name === 'AbortError') return; }
    }
    if (navigator.clipboard) {
      try { await navigator.clipboard.writeText(text); alert('✓ Copied. Paste into Messages.'); return; } catch(e) {}
    }
    const w = window.open('', '_blank');
    w.document.write('<pre style="white-space:pre-wrap;font-family:monospace;padding:20px;background:#0d1117;color:#e6edf3;min-height:100vh;margin:0;">' + text.replace(/</g,'&lt;') + '</pre>');
  }
  window.shareToday = shareToday;

  load();
  render();
</script>
